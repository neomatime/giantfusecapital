<div class="atlas-widget">
  <button class="atlas-launcher" id="atlas-launcher" aria-label="Open chat with Atlas" aria-expanded="false" aria-controls="atlas-panel">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="4" width="18" height="13" rx="3"/><path d="M8 17 L8 20.5 L12 17"/></svg>
  </button>
  <div class="atlas-panel" id="atlas-panel" role="dialog" aria-label="Chat with Atlas" aria-hidden="true">
    <div class="atlas-panel-header">
      <div class="atlas-panel-header-title">
        <span class="atlas-status-dot" aria-hidden="true"></span>
        <div>
          <strong>Atlas</strong>
          <span>Investor Assistant</span>
        </div>
      </div>
      <div class="atlas-panel-header-actions">
        <button type="button" class="atlas-voice-toggle" id="atlas-voice-toggle" aria-pressed="false" aria-label="Turn Atlas voice on">
          <svg class="atlas-icon-muted" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 9 L4 15 L8 15 L13 19 L13 5 L8 9 Z"/><line x1="16" y1="9" x2="21" y2="14"/><line x1="21" y1="9" x2="16" y2="14"/></svg>
          <svg class="atlas-icon-unmuted" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" hidden><path d="M4 9 L4 15 L8 15 L13 19 L13 5 L8 9 Z"/><path d="M16 8 a5 5 0 0 1 0 8"/><path d="M18.5 5.5 a9 9 0 0 1 0 13"/></svg>
        </button>
        <button type="button" class="atlas-close" id="atlas-close-btn" aria-label="Close chat">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="5" y1="5" x2="19" y2="19"/><line x1="19" y1="5" x2="5" y2="19"/></svg>
        </button>
      </div>
    </div>
    <div class="atlas-messages" id="atlas-messages" role="log" aria-live="polite"></div>
    <form class="atlas-input-row" id="atlas-input-form">
      <button type="button" class="atlas-mic" id="atlas-mic-btn" aria-pressed="false" aria-label="Speak your message">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10a7 7 0 0 0 14 0M12 17v4M9 21h6"/></svg>
      </button>
      <div class="atlas-input-wrap" id="atlas-input-wrap">
        <input type="text" id="atlas-input" placeholder="Type a message..." autocomplete="off" aria-label="Message">
        <span class="atlas-mic-wave" aria-hidden="true">Listening<span class="atlas-wave-bars"><span></span><span></span><span></span><span></span></span></span>
      </div>
      <button type="submit" class="atlas-send" aria-label="Send message">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 12 L20 4 L14 20 L11 13 L4 12 Z"/></svg>
      </button>
    </form>
  </div>
</div>
